<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Trust Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/trust/style.css" />
  <link rel="stylesheet" href="/trust/intro.css" />
  <link rel="stylesheet" href="/trust/match.css" />
  <link rel="stylesheet" href="/trust/summary.css" />
  <link rel="stylesheet" href="/trust/reveal.css" />
  <link rel="stylesheet" href="/trust/builder.css" />
  <link rel="stylesheet" href="/trust/compete.css" />
  <link rel="stylesheet" href="/trust/game.css" />
  <link rel="stylesheet" href="/trust/map.css" />
  <link rel="stylesheet" href="/trust/noise.css" />
</head>
<body>

  <!-- ── View: Cold open (markup built by intro.js) ───────────────────────── -->
  <section id="view-cold-open" class="view" role="main"></section>

  <!-- ── View: Dilemma (markup built by intro.js) ─────────────────────────── -->
  <section id="view-dilemma" class="view" role="main"></section>

  <!-- ── View: Character intro card (filled by main.js renderIntroCard) ───── -->
  <section id="view-intro-card" class="view" role="main">
    <div class="cardv">
      <div class="cardv-kicker"><span class="dot"></span>Your opponent</div>
      <div class="cardv-hero">
        <div class="char-silhouette-wrap" aria-hidden="true"><!-- silhouette: JS --></div>
        <h1 class="char-name"><!-- name: JS --></h1>
      </div>
      <p class="char-intro-text"><!-- narrative: JS --></p>
      <div class="cardv-foot">
        <button class="cardv-play" data-action="begin-match">Play <span class="arr">&rarr;</span></button>
        <span class="cardv-foot-note">one game · then you'll understand them</span>
      </div>
    </div>
  </section>

  <!-- ── View: Match — DOM built by match-view.js ─────────────────────────── -->
  <section id="view-match" class="view" role="main"></section>

  <!-- ── View: Match summary — DOM built by summary-view.js ──────────────── -->
  <section id="view-summary" class="view" role="main"></section>

  <!-- ── View: Campaign map — DOM built by map-view.js ───────────────────── -->
  <section id="view-map" class="view" role="main"></section>

  <!-- ── View: Campaign end ──────────────────────────────────────────────── -->
  <section id="view-campaign-end" class="view" role="main">
    <div class="cend">
      <div class="cend-kicker"><span class="dot"></span>The campaign &middot; complete</div>
      <h1 class="cend-title">You've met everyone.</h1>
      <p class="cend-deck">Six people. Six ways of playing the same game.</p>
      <div class="cend-journal" data-journal></div>
      <div class="cend-actions">
        <button class="wsp-btn wsp-btn-primary" data-action="reveal">See what they were &rarr;</button>
        <button class="wsp-btn wsp-btn-ghost" data-action="play-again">Play again</button>
      </div>
    </div>
  </section>

  <!-- ── View: Reveal — DOM built by reveal-view.js ──────────────────────── -->
  <section id="view-reveal" class="view" role="main"></section>

  <!-- ── View: Noise chapter — DOM built by noise-view.js ────────────────── -->
  <section id="view-noise" class="view" role="main"></section>

  <!-- ── View: Evolution — DOM built by evolution-view.js ──────────────────── -->
  <section id="view-evolution" class="view" role="main"></section>

  <!-- ── View: Builder — DOM built by builder-view.js ──────────────────────── -->
  <section id="view-builder" class="view" role="main"></section>

  <!-- ── View: Lab — DOM built by lab-view.js ──────────────────────────────── -->
  <section id="view-lab" class="view" role="main"></section>

  <!-- ── View: Replicator — DOM built by replicator-view.js ────────────────── -->
  <section id="view-replicator" class="view" role="main"></section>

  <script type="module" src="/trust/js/main.js"></script>
</body>
</html>
